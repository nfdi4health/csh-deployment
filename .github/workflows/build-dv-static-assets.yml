name: Build and Push Dataverse Persona Static Assets

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/dataverse/persona/*/static/**'
  pull_request:
    branches:
      - main
    paths:
      - 'k8s/dataverse/persona/*/static/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: dataverse-static-assets

jobs:
  find-personas:
    runs-on: ubuntu-latest
    outputs:
      personas: ${{ steps.set-personas.outputs.personas }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Identify Personas
        id: set-personas
        run: |
          PERSONAS=()
          for dockerfile in k8s/dataverse/persona/*/static/Dockerfile; do
            if [ -f "$dockerfile" ]; then
              PERSONA_DIR=$(dirname $(dirname "$dockerfile"))
              PERSONA=$(basename "$PERSONA_DIR")
              PERSONAS+=("$PERSONA")
            fi
          done
          
          # Output as JSON array for matrix
          JSON_ARRAY=$(echo "${PERSONAS[@]}" | jq -R -s -c 'split(" ") | map(select(length > 0))')
          echo "personas=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build-and-push:
    needs: find-personas
    runs-on: ubuntu-latest
    if: needs.find-personas.outputs.personas != '[]'
    strategy:
      fail-fast: false
      matrix:
        persona: ${{ fromJson(needs.find-personas.outputs.personas) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.persona }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: k8s/dataverse/persona/${{ matrix.persona }}/static
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
