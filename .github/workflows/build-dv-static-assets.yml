name: Build and Push Dataverse Persona Static Assets

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/dataverse/persona/*/static/**'
  pull_request:
    branches:
      - main
    paths:
      - 'k8s/dataverse/persona/*/static/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: dataverse-static-assets

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Identify Personas and Build Images
        run: |
          # Determine the branch name and sanitize it for Docker tags
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
            COMMIT_SHA="${{ github.sha }}"
          fi
          
          # Sanitize branch name: replace / with - and other non-alphanumeric chars
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '/' '-' | sed 's/[^a-zA-Z0-9.-]/-/g')

          for dockerfile in k8s/dataverse/persona/*/static/Dockerfile; do
            if [ -f "$dockerfile" ]; then
              PERSONA_DIR=$(dirname $(dirname "$dockerfile"))
              PERSONA=$(basename "$PERSONA_DIR")
              STATIC_DIR=$(dirname "$dockerfile")
              
              echo "Processing persona: $PERSONA"
              
              IMAGE_ID=${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_PREFIX }}-$PERSONA
              IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')
              
              # Tags to build and push
              TAGS=()
              TAGS+=("$IMAGE_ID:$COMMIT_SHA")
              TAGS+=("$IMAGE_ID:$SAFE_BRANCH_NAME")
              
              if [[ "$BRANCH_NAME" == "main" ]]; then
                TAGS+=("$IMAGE_ID:latest")
              fi
              
              echo "Building image for tags: ${TAGS[*]}"
              
              # Build once
              docker build "$STATIC_DIR" $(printf -- "--tag %s " "${TAGS[@]}")
              
              # Push all tags
              for tag in "${TAGS[@]}"; do
                docker push "$tag"
              done
            fi
          done
