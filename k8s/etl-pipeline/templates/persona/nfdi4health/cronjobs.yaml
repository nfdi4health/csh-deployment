{{- if and (eq .Values.persona "nfdi4health") .Values.stages.extract.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-extract-job
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 14400 # Start missed jobs up to 4 hours late
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: extract
              image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
              command:
                - /bin/sh
                - -c
              args:
                - >
                  EXTRACT_PATH=$(echo "${S3_PATH}/$(date +%Y-%m-%d).parquet");
                  if aws s3 ls s3://${EXTRACT_PATH}/_SUCCESS --endpoint-url=$AWS_ENDPOINT_URL; then
                    echo "Parquet file already exists, skipping."
                    exit 0
                  fi;
                  SINCE_ARG="";
                  {{- if .Values.stages.extract.arguments.since }}
                  SINCE_ARG="--since {{ .Values.stages.extract.arguments.since }}";
                  echo "Using hardcoded since argument: $SINCE_ARG";
                  {{- else if .Values.stages.extract.incremental }}
                  LAST_SUCCESS_DATE=$(aws s3 ls "s3://${S3_PATH}/" --recursive --endpoint-url=$AWS_ENDPOINT_URL | grep '/_SUCCESS$' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}-checkpoint' | sort | tail -n 1 | cut -d'-' -f1-3);
                  if [ -n "$LAST_SUCCESS_DATE" ]; then
                    SINCE_ARG="--since $LAST_SUCCESS_DATE";
                    echo "Found last successful load from $LAST_SUCCESS_DATE, using $SINCE_ARG";
                  fi;
                  {{- else }}
                  echo "Incremental update disabled, running full extract.";
                  {{- end }}
                  python3 -u -m etljobs.extract.extract_data --data-source {{ lower .Values.source }} {{ if ne (print .Values.stages.extract.arguments.delay) "" }}--delay {{ .Values.stages.extract.arguments.delay }} {{ end }} {{ if ne (print .Values.stages.extract.arguments.workers) "" }}--workers {{ .Values.stages.extract.arguments.workers }} {{ end }}--temp-dir /tmp/extract --output s3://$EXTRACT_PATH {{ if .Values.stages.extract.arguments.limit }}--limit {{ .Values.stages.extract.arguments.limit }} {{ end }}$SINCE_ARG
---
{{ end -}}
{{ if and (eq .Values.persona "nfdi4health") .Values.stages.transform.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-transform-job
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 14400 # Start missed jobs up to 4 hours late
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: wait-for-extract
              image: amazon/aws-cli
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
              command: ["sh", "-c"]
              args:
                - >
                  {{- if .Values.stages.transform.arguments.inputPath }}
                  EXTRACT_PATH="${S3_PATH}/{{ .Values.stages.transform.arguments.inputPath }}";
                  {{- else }}
                  EXTRACT_PATH="${S3_PATH}/$(date +%Y-%m-%d).parquet";
                  {{- end }}
                  echo "Waiting for s3://$EXTRACT_PATH...";
                  until aws s3 ls s3://$EXTRACT_PATH/_SUCCESS --endpoint-url=$AWS_ENDPOINT_URL; 
                  do sleep 10; done
          containers:
            - name: spark-submit
              image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: SOURCE
                  value: {{ .Values.source | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
                - name: NO_PROXY
                  value: "localhost,127.0.0.1,kubernetes.default.svc,kubernetes.default.svc.cluster.local"
                - name: no_proxy
                  value: "localhost,127.0.0.1,kubernetes.default.svc,kubernetes.default.svc.cluster.local"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
              resources:
                {{ toYaml .Values.stages.transform.resources | nindent 16 }}
              command:
                - /bin/sh
                - -c
              args:
                - >
                  {{- if .Values.stages.transform.arguments.inputPath }}
                  EXTRACT_PATH="${S3_PATH}/{{ .Values.stages.transform.arguments.inputPath }}";
                  {{- else }}
                  EXTRACT_PATH="${S3_PATH}/$(date +%Y-%m-%d).parquet";
                  {{- end }}
                  {{- if .Values.stages.transform.arguments.outputPath }}
                  TRANSFORM_PATH="${S3_PATH}/{{ .Values.stages.transform.arguments.outputPath }}";
                  {{- else }}
                  TRANSFORM_PATH="${S3_PATH}/$(date +%Y-%m-%d)-converted.parquet";
                  {{- end }}
                  if aws s3 ls s3://${TRANSFORM_PATH}/_SUCCESS --endpoint-url=$AWS_ENDPOINT_URL; then
                    echo "Parquet file already exists, skipping."
                    exit 0
                  fi;
                  /opt/spark/bin/spark-submit
                  --master
                  local[*]
                  --driver-memory
                  {{ .Values.stages.transform.spark.resources.driverMemory | quote }}
                  --name
                  etl-job-transform-$SOURCE
                  --conf
                  spark.jars.ivy=/tmp/.ivy
                  --conf
                  spark.hadoop.fs.s3a.endpoint="$AWS_ENDPOINT_URL"
                  --conf
                  spark.hadoop.fs.s3a.path.style.access=true
                  --conf
                  spark.hadoop.fs.s3a.access.key="$(AWS_ACCESS_KEY_ID)"
                  --conf
                  spark.hadoop.fs.s3a.secret.key="$(AWS_SECRET_ACCESS_KEY)"
                  local:///src/etljobs/main.py
                  --job
                  job-$SOURCE
                  --job-args
                  s3a://$EXTRACT_PATH
                  s3a://$TRANSFORM_PATH
---
{{ end -}}
{{ if and (eq .Values.persona "nfdi4health") .Values.stages.load.substages.submit.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-load-job
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 14400 # Start missed jobs up to 4 hours late
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: wait-for-transform
              image: amazon/aws-cli
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
                - name: COLLECTIONS_PATH
                  value: {{ .Values.s3.collectionsPath | replace "s3://" "" | quote }}
              command: ["sh", "-c"]
              args:
                - >
                  {{- if .Values.stages.load.substages.submit.arguments.inputPath }}
                  INPUT_PATH="${S3_PATH}/{{ .Values.stages.load.substages.submit.arguments.inputPath }}";
                  {{- else }}
                  INPUT_PATH="${S3_PATH}/$(date +%Y-%m-%d)-converted.parquet";
                  {{- end }}
                  until aws s3 ls s3://${INPUT_PATH}/_SUCCESS --endpoint-url=$AWS_ENDPOINT_URL && aws s3 ls s3://$COLLECTIONS_PATH --endpoint-url=$AWS_ENDPOINT_URL; do echo "Waiting for s3://${INPUT_PATH}/_SUCCESS and s3://${COLLECTIONS_PATH}..."; sleep 10; done
          containers:
            - name: spark-submit
              image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: SOURCE
                  value: {{ .Values.source | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
                - name: NO_PROXY
                  value: "localhost,127.0.0.1,kubernetes.default.svc,kubernetes.default.svc.cluster.local"
                - name: no_proxy
                  value: "localhost,127.0.0.1,kubernetes.default.svc,kubernetes.default.svc.cluster.local"
                - name: DATAVERSE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: DATAVERSE_API_KEY
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
                - name: DATAVERSE_HOST
                  value: {{ .Values.dataverse.host | quote }}
                - name: COLLECTIONS_PATH
                  value: {{ .Values.s3.collectionsPath | replace "s3://" "" | quote }}
              resources:
                {{ toYaml .Values.stages.load.substages.submit.resources | nindent 16 }}
              command:
                - /bin/sh
                - -c
              args:
                - >
                  {{- if .Values.stages.load.substages.submit.arguments.inputPath }}
                  INPUT_PATH="${S3_PATH}/{{ .Values.stages.load.substages.submit.arguments.inputPath }}";
                  {{- else }}
                  INPUT_PATH="${S3_PATH}/$(date +%Y-%m-%d)-converted.parquet";
                  {{- end }}
                  /opt/spark/bin/spark-submit
                  --master
                  local[*]
                  --name
                  etl-job-load-$SOURCE
                  --conf
                  spark.jars.ivy=/tmp/.ivy
                  --conf
                  spark.hadoop.fs.s3a.endpoint="$AWS_ENDPOINT_URL"
                  --conf
                  spark.hadoop.fs.s3a.path.style.access=true
                  --conf
                  spark.hadoop.fs.s3a.access.key="$(AWS_ACCESS_KEY_ID)"
                  --conf
                  spark.hadoop.fs.s3a.secret.key="$(AWS_SECRET_ACCESS_KEY)"
                  --conf
                  spark.sql.parquet.columnarReaderBatchSize={{ .Values.stages.load.substages.submit.arguments.columnarReaderBatchSize }}
                  local:///src/etljobs/main.py
                  --job
                  submit_dataverse
                  --job-args
                  s3a://$INPUT_PATH
                  $(DATAVERSE_HOST)
                  $(DATAVERSE_API_KEY)
                  s3://$COLLECTIONS_PATH
                  --threads={{ .Values.stages.load.substages.submit.arguments.threads }}
                  {{- if .Values.stages.load.substages.submit.arguments.skipCollectionUpdates }}
                  --skip-collection-updates
                  {{- end }}
---
{{ end -}}
{{ if and (eq .Values.persona "nfdi4health") .Values.stages.load.substages.publish.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-publish-job
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 14400 # Start missed jobs up to 4 hours late
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: wait-for-load
              image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.s3.endpointUrl | quote }}
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
                - name: S3_PATH
                  value: {{ printf "%s/%s" (.Values.s3.basePath | replace "s3://" "") (lower .Values.source) | quote }}
              command: ["/bin/sh", "-c"]
              args:
                - >
                  CHECKPOINT_PATH="${S3_PATH}/$(date +%Y-%m-%d)-checkpoint";
                  until aws s3 ls s3://${CHECKPOINT_PATH}/_SUCCESS --endpoint-url=$AWS_ENDPOINT_URL; do sleep 10; done
          containers:
            - name: spark-submit
              image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: SOURCE
                  value: {{ .Values.source | quote }}
                - name: DATAVERSE_HOST
                  value: {{ .Values.dataverse.host | quote }}
                - name: DATAVERSE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-credentials
                      key: DATAVERSE_API_KEY
                - name: TZ
                  value: {{ .Values.timeZone | quote }}
              command:
                - "python3"
                - "-u" # unbuffered, so logs are immediately flushed
                - "scripts/publish_all_datasets.py"
                - "-d"
                - "$(DATAVERSE_HOST)"
                - "-k"
                - "$(DATAVERSE_API_KEY)"
                - "-t"
                - "updatecurrent"
                - "-c"
                - "$(SOURCE)"
{{- end -}}
