apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - fairagro_job.yaml

namespace: spark

images:
  - name: ghcr.io/nfdi4health/csh-etl-pipeline
    newTag: "latest" # OPTIONAL: Insert tag of ETL pipeline image to be used (don't use latest, use an image of feat/fairagro-datasearch).

configMapGenerator:
  - name: fairagro-job-args
    literals:
      - SOURCE_BUCKET="" # TODO: Insert bucket where source data is located. Example: "km-bonn-prod-fairagro-searchhub-storage"
#      - COLLECTIONS_PATH="" # TODO: Insert path where collection JSON is located. Not used by FAIRagro. Example: "km-bonn-prod-nfdi4health-etl-data/collections.json"
      - SPARK_CONTAINER_IMAGE_TAG="latest" # OPTIONAL: Insert tag of ETL pipeline image to be used (don't use latest, use an image of feat/fairagro-datasearch).
      - DATAVERSE_HOST="" # TODO: Insert Dataverse URL. Example: "http://my-dataverse-svc.default.svc.cluster.local:8080"
      - DATAVERSE_COLLECTION="fairagro" # TODO: Insert alias of the parent dataverse collection. After data loading, all its datasets will be published. Example: "fairagro"

secretGenerator:
  - name: fairagro-job-credentials
    literals:
      - DATAVERSE_API_KEY="" # TODO: Insert Dataverse API key.
      - GITHUB_MIDDLEWARE_TOKEN="" # TODO: Insert a GitHub access token that can clone middleware_repo.