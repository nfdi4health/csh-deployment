---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fairagro-wrap-parquet-job-template
spec:
  # This cronjob should never be scheduled. It serves as a template for fairagro-pipeline-runner.
  schedule: "0 0 31 2 *"
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: spark
          restartPolicy: Never
          containers:
            - name: spark-submit
              image: ghcr.io/nfdi4health/csh-etl-pipeline:latest
              envFrom:
                - secretRef:
                    name: etl-job-s3-credentials
                - configMapRef:
                    name: etl-job-s3-config
                - configMapRef:
                    name: fairagro-job-args
                - secretRef:
                    name: fairagro-job-credentials
              command: ["/bin/sh", "-c"]
              args:
                - >
                  /opt/spark/bin/spark-submit
                  --master
                  k8s://https://kubernetes.default.svc
                  --deploy-mode
                  cluster
                  --name
                  fairagro-wrap-parquet-job
                  --conf
                  spark.kubernetes.namespace=spark
                  --conf
                  spark.kubernetes.authenticate.driver.serviceAccountName=spark
                  --conf
                  spark.kubernetes.container.image="ghcr.io/nfdi4health/csh-etl-pipeline:$SPARK_CONTAINER_IMAGE_TAG"
                  --conf
                  spark.jars.ivy=/tmp/.ivy
                  --conf
                  spark.hadoop.fs.s3a.endpoint="$AWS_ENDPOINT_URL"
                  --conf
                  spark.hadoop.fs.s3a.path.style.access=true
                  --conf
                  spark.hadoop.fs.s3a.access.key="$AWS_ACCESS_KEY_ID"
                  --conf
                  spark.hadoop.fs.s3a.secret.key="$AWS_SECRET_ACCESS_KEY"
                  --conf
                  spark.kubernetes.driverEnv.AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID"
                  --conf
                  spark.kubernetes.driverEnv.AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY"
                  --conf
                  spark.kubernetes.driverEnv.AWS_ENDPOINT_URL="$AWS_ENDPOINT_URL"
                  --conf
                  spark.executorEnv.AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID"
                  --conf
                  spark.executorEnv.AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY"
                  --conf
                  spark.executorEnv.AWS_ENDPOINT_URL="$AWS_ENDPOINT_URL"
                  local:///src/etljobs/main.py
                  --job
                  job_fairagro_wrap_parquet
                  --job-args
                  s3a://$SOURCE_BUCKET/ingest_pipeline/all_rdi_datasets
                  s3a://$SOURCE_BUCKET/ingest_pipeline/all_rdi_datasets-converted.parquet
---
