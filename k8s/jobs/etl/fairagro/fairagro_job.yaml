apiVersion: batch/v1
kind: CronJob
metadata:
  name: fairagro-pipeline-runner
spec:
  schedule: "0 3 * * 6" # runs weekly, Sat 03:00
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: spark
          restartPolicy: OnFailure
          containers:
            - name: runner
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  JOBS="fairagro-s3-cleanup-job fairagro-clone-job fairagro-transform-job fairagro-wrap-parquet-job fairagro-load-job fairagro-publish-job"
                  for job in $JOBS; do
                    echo "Running $job from cronjob/$job-template..."
                    kubectl delete job $job --ignore-not-found=true
                    kubectl create job $job --from=cronjob/$job-template
                    
                    echo "Waiting for $job to complete (timeout: 12 hrs)..."
                    if ! kubectl wait --for=condition=complete job/$job --timeout=43200s; then
                      echo "ERROR: $job timed out or failed, details logged."
                      kubectl describe job $job
                      exit 1
                    fi
                    echo "$job completed."
                  done
                  echo "Pipeline completed successfully: FAIRagro middleware contents cloned, transformed, and ingested."