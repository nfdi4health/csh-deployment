apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  selector:
    matchLabels:
      name: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        name: {{ .Release.Name }}-frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.images.frontend }}
        resources:
          limits:
            memory: 500Mi
          requests:
            memory: 100Mi
        env:
          - name: API_PASS
            value: http://{{ .Release.Name }}-backend:5000
          - name: KEYCLOAK_URL
            value: {{ .Values.oidc.frontend.authority }}
          - name: KEYCLOAK_CLIENTID
            value: {{ .Values.oidc.frontend.clientid }}
          - name: USERBACK_TOKEN
            value: {{ .Values.frontend.userback_access_token }}
        ports:
          - containerPort: 80
{{- if not (empty .Values.frontend.basicAuth.htpasswd) }}
        volumeMounts:
          - mountPath: /etc/nginx/.htpasswd
            name: frontend-basic-auth
            subPath: .htpasswd
            readOnly: true
      volumes:
        - name: frontend-basic-auth
          secret:
            secretName: {{ .Release.Name }}-frontend-basic-auth
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
  selector:
    name: {{ .Release.Name }}-frontend
{{- if not (empty .Values.frontend.basicAuth.htpasswd) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-frontend-basic-auth
type: Opaque
stringData:
  .htpasswd: {{ .Values.frontend.basicAuth.htpasswd | quote }}
{{- end }}
